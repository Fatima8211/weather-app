<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="weather-card">
        <h1>Weather App</h1>
        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter City Name">
            <button id="searchBtn">
                Search
            </button>
        </div>
        <div id="weather">
            <img
                id="icon"
                src="https://cdn.weatherapi.com/weather/64x64/day/113.png"
                alt="Weather Icon">
            <h2 id="city">City</h2>
            <h1 id="temp">--°C</h1>
            <p id="condition">Weather Condition</p>
            <div class="details">

                <div class="card">
                    <h3>Humidity</h3>
                    <p id="humidity">--%</p>
                </div>

                <div class="card">
                    <h3>Wind</h3>
                    <p id="wind">-- km/h</p>
                </div>

                <div class="card">
                    <h3>Feels Like</h3>
                    <p id="feels">--°C</p>
                </div>

                <div class="card">
                    <h3>UV Index</h3>
                    <p id="uv">--</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
